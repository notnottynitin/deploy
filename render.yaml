services:
  - type: web
    name: vera-ai-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
    healthCheckPath: /v1/healthz
    autoDeploy: true
